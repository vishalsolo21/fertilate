<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NPK Calculator | RAIGANJLOOTERS</title>

<style>

:root{

--green:#2e7d32;
--green2:#43a047;
--light:#f4fff4;
--card:#ffffff;
--text:#222;
--border:#d6e7d6;
--shadow:0 10px 25px rgba(0,0,0,.12);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:var(--light);
color:var(--text);
transition:.3s;

}

header{

background:linear-gradient(90deg,var(--green),var(--green2));
color:white;
padding:18px;
text-align:center;
box-shadow:var(--shadow);

}

header h1{

font-size:30px;

}

header p{

margin-top:8px;

}

.container{

max-width:1000px;
margin:25px auto;
padding:15px;

}

.card{

background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:22px;
margin-bottom:20px;
box-shadow:var(--shadow);

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;

}

label{

font-weight:bold;
display:block;
margin-bottom:8px;

}

input,select{

width:100%;
padding:12px;
font-size:17px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);

}

.buttons{

display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:18px;

}

button{

border:none;
cursor:pointer;
padding:13px 22px;
font-size:16px;
border-radius:10px;
background:var(--green);
color:white;
transition:.25s;

}

button:hover{

transform:translateY(-2px);

}

.secondary{

background:#1976d2;

}

.orange{

background:#ef6c00;

}

}

.result{

margin-top:25px;
padding:20px;
background:#fff;
border:3px solid #2e7d32;
border-radius:18px;
box-shadow:0 5px 15px rgba(46,125,50,.15);
overflow:auto;

}

.result table{

width:100%;
border-collapse:collapse;
margin-top:15px;

}

.result th{

background:#edf8ed;
color:#1b5e20;
padding:12px;
text-align:left;
font-size:18px;

}

.result td{

padding:14px 12px;
border-bottom:1px solid #d8e8d8;
font-size:17px;

}

.result tr:last-child td,
.result tr:last-child th{

font-weight:bold;
font-size:20px;
background:#f7fff7;

}

.verify{

margin-top:18px;
padding:15px;
border-radius:12px;
font-weight:bold;

}

.success{

margin-top:25px;
padding:18px;
background:#e9f9e9;
border:2px solid #4caf50;
border-radius:14px;
color:#1b5e20;
font-weight:bold;

}

.error{

margin-top:25px;
padding:18px;
background:#fff3e0;
border:2px solid #ff9800;
border-radius:14px;
color:#e65100;
font-weight:bold;

}

footer{

margin-top:35px;
padding:18px;
text-align:center;
font-size:15px;
color:#888;

}

@media(max-width:700px){

header h1{

font-size:24px;

}

button{

width:100%;

}

}

</style>
</head>

<body>

<header>

<h1>🌿 NPK Fertilizer Formulation Calculator</h1>

<p>Using Urea • DAP • SSP • MOP • Filler</p>

</header>

<div class="container">

<div class="card">

<div class="grid">

<div>

<label>Nitrogen (N %)</label>

<input
type="number"
id="n"
min="0"
max="46"
placeholder="">

</div>

<div>

<label>Phosphorus (P₂O₅ %)</label>

<input
type="number"
id="p"
min="0"
max="46"
placeholder="">

</div>

<div>

<label>Potassium (K₂O %)</label>

<input
type="number"
id="k"
min="0"
max="60"
placeholder="">

</div>

<div>

<label>Batch Size</label>

<select id="batch">

<option value="100">100g</option>
<option value="250">250g</option>
<option value="500">500g</option>
<option value="1000" selected>1kg</option>

</select>

</div>

</div>

<div class="buttons">

<button id="calcBtn"> 🧮 CALCULATE </button>

<button class="secondary" id="copyBtn">📋 COPY</button>

<button class="orange" id="printBtn">🖨️ PRINT / PDF</button>
</div>
<br><br>
<div class="result" id="result">
    <div class="result-box">
        <h2>🧮 Fertilizer Formulation</h2>
        <p style="text-align:center;color:#666;">
            Enter the required NPK values and click
            <strong>Calculate</strong> to generate the formulation.
        </p>
    </div>
</div></div>
<footer> Made with ❤️ by Vishal |
<font style="color:#2e7d32;font-weight:bold;">
RAIGANJLOOTERS
</font> </footer>

<script>

const result=document.getElementById("result");

const calcBtn=document.getElementById("calcBtn");

const copyBtn=document.getElementById("copyBtn");

const printBtn=document.getElementById("printBtn");

// ===== Part 2 starts below =====
const RAW={
urea:{N:46,P:0,K:0},
dap:{N:18,P:46,K:0},
ssp:{N:0,P:16,K:0},
mop:{N:0,P:0,K:60}
};

function r(x){
return Math.round(x*100)/100;
}

calcBtn.onclick=function(){

let N=parseFloat(document.getElementById("n").value);
let P=parseFloat(document.getElementById("p").value);
let K=parseFloat(document.getElementById("k").value);

let batch=parseFloat(document.getElementById("batch").value);

if(isNaN(N)||isNaN(P)||isNaN(K)){

result.innerHTML=
"<div class='verify error'>⚠️ Enter all NPK values.</div>";

return;

}

if(N<0||P<0||K<0){

result.innerHTML=
"<div class='verify error'>⚠️ Negative values are not allowed.</div>";

return;

}

let mop=batch*K/60;

let dap=batch*P/46;

let nitrogenFromDAP=dap*18/100;

let nitrogenNeeded=batch*N/100;

let urea=(nitrogenNeeded-nitrogenFromDAP)/0.46;

let ssp=0;

if(urea<0){

ssp=batch*P/16;

dap=0;

urea=batch*N/46;

}

let filler=batch-(urea+dap+ssp+mop);

if (
    urea < 0 ||
    dap < 0 ||
    ssp < 0 ||
    mop < 0 ||
    filler < 0
) {

    const total = urea + dap + ssp + mop;

    result.innerHTML = `
    <div class="verify error">

    <h2>⚠️ Impossible Formulation</h2>

    <p><b>Batch:</b> ${batch.toFixed(2)} g</p>

    <p><b>Target:</b> ${N}:${P}:${K}</p>

    <br>

    <table>

    <tr><td>Urea</td><td>${Math.max(0, urea).toFixed(2)} g</td></tr>

    <tr><td>DAP</td><td>${Math.max(0, dap).toFixed(2)} g</td></tr>

    <tr><td>SSP</td><td>${Math.max(0, ssp).toFixed(2)} g</td></tr>

    <tr><td>MOP</td><td>${Math.max(0, mop).toFixed(2)} g</td></tr>

    <tr><td>Filler</td><td>0.00 g</td></tr>

    <tr>
        <th>Total Ingredients</th>
        <th>${total.toFixed(2)} g</th>
    </tr>

    </table>

    <br>

    ❌ <b>Impossible with selected raw materials (ingredients exceed batch weight).</b>

    </div>
    `;

    return;
}

urea=r(urea);
dap=r(dap);
ssp=r(ssp);
mop=r(mop);
filler=r(filler);

let calcN=(urea*46+dap*18)/batch;

let calcP=(dap*46+ssp*16)/batch;

let calcK=(mop*60)/batch;

calcN=r(calcN);
calcP=r(calcP);
calcK=r(calcK);

let ok=
Math.abs(calcN-N)<=0.15 &&
Math.abs(calcP-P)<=0.15 &&
Math.abs(calcK-K)<=0.15;

result.innerHTML=`
<div class="result-box">
<h2>✅ Recommended Formulation</h2>

<table>

<tr>
<th>Raw Material</th>
<th>Quantity</th>
</tr>

<tr>
<td>Urea</td>
<td>${urea} g</td>
</tr>

<tr>
<td>DAP</td>
<td>${dap} g</td>
</tr>

<tr>
<td>SSP</td>
<td>${ssp} g</td>
</tr>

<tr>
<td>MOP</td>
<td>${mop} g</td>
</tr>

<tr>
<td>Filler</td>
<td>${filler} g</td>
</tr>

<tr>

<th>Total</th>

<th>${batch} g</th>

</tr>

</table>

<div class="verify ${ok?'success':'error'}">

<b>Verification</b><br><br>

Target :
${N}:${P}:${K}

<br><br>

Calculated :

${calcN}:${calcP}:${calcK}

<br><br>

${ok?"✅ Formulation Verified":"⚠️ Formulation mismatch"}

</div>
</div>
`;

};
// ---------- COPY FORMULATION ----------

copyBtn.onclick = function () {

    const box = document.getElementById("result");

    const footer = "Made with ❤️ by Vishal | RAIGANJLOOTERS";

    const text = box.innerText.trim() + "\n\n" + footer;

    navigator.clipboard.writeText(text)
    .then(() => {
        alert("Formulation copied successfully.");
    })
    .catch(() => {
        alert("Unable to copy.");
    });

};

// ---------- PRINT / SAVE PDF ----------

printBtn.onclick=function(){

window.print();

};

// ---------- PRINT STYLE ----------

const style=document.createElement("style");

style.innerHTML=`

@media print{

body{

background:white;

}

button{

display:none;

}

header{

box-shadow:none;

}

.card{

box-shadow:none;

border:1px solid #999;

}

footer{

margin-top:30px;

font-size:14px;

font-weight:bold;

color:#444;

}

}

`;

document.head.appendChild(style);

// ---------- END SCRIPT ----------

</script>

</body>

</html>
